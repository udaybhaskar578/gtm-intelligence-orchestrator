<template>
    <div class="slds-p-around_large">

        <!-- In progress -->
        <template lwc:if={isLoading}>
            <div class="slds-align_absolute-center" style="flex-direction: column;">
                <lightning-spinner alternative-text="Enriching..." size="medium"></lightning-spinner>
                <p class="slds-m-top_medium slds-text-color_weak">
                    Generating battle card for <strong>{accountName}</strong>...
                </p>
                <p class="slds-text-body_small slds-text-color_weak slds-m-top_small">
                    This may take up to 2 minutes.
                </p>
            </div>
        </template>

        <!-- Success -->
        <template lwc:elseif={isSuccess}>
            <div class="slds-align_absolute-center" style="flex-direction: column; text-align: center;">
                <lightning-icon
                    icon-name="utility:success"
                    variant="success"
                    size="large"
                    class="slds-m-bottom_medium">
                </lightning-icon>
                <h2 class="slds-text-heading_medium slds-m-bottom_small">Enrichment complete!</h2>
                <p class="slds-text-color_weak">Battle card has been generated for <strong>{accountName}</strong>.</p>
                <p class="slds-text-color_weak slds-m-top_small">Close this window to see the updated battle card.</p>
            </div>
            <div class="slds-m-top_large slds-align_absolute-center">
                <lightning-button label="Close" variant="brand" onclick={handleClose}></lightning-button>
            </div>
        </template>

        <!-- Error -->
        <template lwc:elseif={isError}>
            <div style="text-align: center;">
                <lightning-icon
                    icon-name="utility:error"
                    variant="error"
                    size="large"
                    class="slds-m-bottom_medium">
                </lightning-icon>
                <h2 class="slds-text-heading_medium slds-m-bottom_small">Enrichment failed</h2>
                <p class="slds-text-color_error slds-m-bottom_medium">{errorMessage}</p>
                <div class="slds-grid slds-grid_align-center slds-gutters">
                    <div class="slds-col">
                        <lightning-button label="Retry" variant="brand" onclick={handleRetry}></lightning-button>
                    </div>
                    <div class="slds-col">
                        <lightning-button label="Close" variant="neutral" onclick={handleClose}></lightning-button>
                    </div>
                </div>
            </div>
        </template>

    </div>
</template>
